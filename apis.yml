    image: 
      https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.crunchbase.com
    humanURL: https://data.crunchbase.com/docs
    properties:
      - url: https://data.crunchbase.com/docs
        type: Documentation
      - url: https://data.crunchbase.com/docs/authentication
        type: Authentication
      - url: https://data.crunchbase.com/docs/rate-limiting
        type: RateLimits
      - url: https://data.crunchbase.com/docs/changelog
        type: ChangeLog
    description: >-
      The Crunchbase API provides programmatic access to Crunchbase's comprehensive
      business data platform, covering companies, people, investors, funding rounds,
      acquisitions, and IPOs. Developers can search and retrieve detailed profiles
      for organizations and individuals, query investment data including funding rounds
      and investors, and access information about mergers, acquisitions, and exits.
      The API supports filtering, sorting, and field selection, and uses API key-based
      authentication.
